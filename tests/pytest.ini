[pytest]
# Diretório raiz dos testes
testpaths = tests

# Exibe cada teste individualmente por padrão (-v)
addopts = -v --tb=short

# Padrão de descoberta de arquivos e funções de teste
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Marcadores customizados (evita warnings de marcadores desconhecidos)
markers =
    unit:        Testes unitários isolados (sem I/O externo)
    integration: Testes que envolvem múltiplas camadas juntas
    slow:        Testes mais lentos (ex: futuros testes de rede reais)
